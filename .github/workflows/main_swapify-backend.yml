name: Build and deploy Node.js app to Azure Web App - swapify-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install
        run: npm install --production

      - name: Zip artifact for deployment
        run: zip -r release.zip . --exclude "*.git*" --exclude "frontend/*" --exclude "*.zip"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6424108723FA44BAB0CE9990C71BF346 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3E5B0CE25F014B8DA9613E5B48BBD3BD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AF86AFC2C86E4CFDBA9AAA0A820DBDFE }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'swapify-backend'
          slot-name: 'Production'
          package: release.zip